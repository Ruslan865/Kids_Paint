<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint - Tutu Parrot Coloring</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #f0f0f0;
  }
  #canvasContainer {
    display: inline-block;
    margin-top: 20px;
  }
  canvas {
    border: 2px solid #333;
    cursor: crosshair;
  }
  #palette, #brushControls {
    margin-top: 15px;
  }
  .color {
    display: inline-block;
    width: 30px;
    height: 30px;
    margin: 2px;
    border: 1px solid #000;
    cursor: pointer;
  }
  #controls button, #brushControls input {
    margin: 0 5px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  #brushSizeDisplay {
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>KidsPaint: Tutu Parrot Coloring</h1>
<p>Select a color, change brush size, paint on the image, and download your work.</p>

<div id="canvasContainer">
  <canvas id="paintCanvas" width="1050" height="1050"></canvas>
</div>

<div id="palette"></div>

<div id="brushControls">
  Brush size: <span id="brushSizeDisplay">10</span>
  <input type="range" id="brushSize" min="1" max="50" value="10">
</div>

<div id="controls">
  <button id="clearBtn">Clear</button>
  <button id="downloadBtn">Download</button>
  <button id="seeRealBtn">See the real version</button>
</div>

<script>
// --- Canvas setup ---
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let currentColor = '#FF0000';
let brushSize = 10;

// Load image
const img = new Image();
img.src = 'tutu_bw.png';
img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

// --- Colors palette ---
const colors = [
  '#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF',
  '#00FFFF','#FFA500','#800080','#008000','#000080',
  '#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'
];

const paletteDiv = document.getElementById('palette');
colors.forEach(color => {
  const div = document.createElement('div');
  div.className = 'color';
  div.style.backgroundColor = color;
  div.onclick = () => currentColor = color;
  paletteDiv.appendChild(div);
});

// --- Brush size control ---
const brushInput = document.getElementById('brushSize');
const brushDisplay = document.getElementById('brushSizeDisplay');
brushInput.oninput = () => {
  brushSize = brushInput.value;
  brushDisplay.textContent = brushSize;
};

// --- Drawing ---
canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);
canvas.addEventListener('mousemove', draw);

function draw(e){
  if(!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  ctx.fillStyle = currentColor;
  ctx.beginPath();
  ctx.arc(x, y, brushSize, 0, Math.PI * 2);
  ctx.fill();
}

// --- Clear button ---
document.getElementById('clearBtn').onclick = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const resetImg = new Image();
  resetImg.src = 'tutu_bw.png';
  resetImg.onload = () => ctx.drawImage(resetImg, 0, 0, canvas.width, canvas.height);
};

// --- Download button ---
document.getElementById('downloadBtn').onclick = () => {
  const link = document.createElement('a');
  link.download = 'my_colored_parrot.png';
  link.href = canvas.toDataURL();
  link.click();
};

// --- YouTube button ---
document.getElementById('seeRealBtn').onclick = () => {
  window.open('https://www.youtube.com/', '_blank');
};
</script>

</body>
</html>
