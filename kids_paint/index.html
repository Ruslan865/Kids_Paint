<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint - Tutu Parrot Coloring</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #f0f0f0;
  }

  #canvasContainer {
    display: inline-block;
    margin-top: 20px;
  }

  canvas {
    border: 2px solid #333;
    cursor: crosshair;
  }

  #palette {
    margin-top: 15px;
  }

  .color {
    display: inline-block;
    width: 30px;
    height: 30px;
    margin: 2px;
    border: 1px solid #000;
    cursor: pointer;
  }

  #controls {
    margin-top: 10px;
  }

  button {
    margin: 0 5px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>KidsPaint: Tutu Parrot Coloring</h1>
<p>Select a color and paint on the image.</p>

<div id="canvasContainer">
  <canvas id="paintCanvas" width="1050" height="1050"></canvas>
</div>

<div id="palette"></div>

<div id="controls">
  <button id="clearBtn">Clear</button>
  <button id="seeRealBtn">See the real version</button>
</div>

<script>
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');

const img = new Image();
img.src = 'tutu_bw.png';   // Şəkil adı DƏQİQ belə olmalıdır
img.onload = function() {
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
};

// Rənglər
const colors = [
  '#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF',
  '#00FFFF','#FFA500','#800080','#008000','#000080',
  '#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'
];

const paletteDiv = document.getElementById('palette');
let currentColor = colors[0];

colors.forEach(color => {
  const div = document.createElement('div');
  div.className = 'color';
  div.style.backgroundColor = color;
  div.onclick = function() {
    currentColor = color;
  };
  paletteDiv.appendChild(div);
});

// Çəkmə funksiyası
let drawing = false;

canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);
canvas.addEventListener('mousemove', draw);

function draw(e) {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ctx.fillStyle = currentColor;
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.fill();
}

// Təmizləmə
document.getElementById('clearBtn').onclick = function() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
};

// YouTube düyməsi
document.getElementById('seeRealBtn').onclick = function() {
  window.open('https://www.youtube.com/', '_blank');
};
</script>

</body>
</html>
